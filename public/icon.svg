<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#0d9488"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- room wall: a rounded panel that frames the doorway -->
  <rect x="118" y="96" width="276" height="320" rx="34" fill="#ffffff"/>
  <!-- floor line beneath the wall -->
  <rect x="96" y="404" width="320" height="20" rx="10" fill="#ffffff" opacity="0.92"/>

  <!-- doorway opening cut into the wall (teal = see-through to background) -->
  <path d="M182 416 L182 236 Q182 168 256 168 Q330 168 330 236 L330 416 Z" fill="url(#bg)"/>
  <!-- open door panel, slightly ajar, hinged on the right -->
  <path d="M330 416 L330 176 L268 196 L268 416 Z" fill="#ffffff" opacity="0.55"/>
  <!-- door handle -->
  <circle cx="286" cy="300" r="11" fill="#ffffff"/>
</svg>
